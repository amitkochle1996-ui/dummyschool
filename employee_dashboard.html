<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employess Dashboard : Dummy School</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="icon" href="Images/logor.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
     body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .main-heading { font-family: 'Playfair Display', serif; color: #008080; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center p-8 bg-gray-100">
    <header class="text-center mb-8 w-full max-w-4xl">
        <h1 class="text-5xl font-extrabold main-heading text-green-600 mb-2">Employee Dashboard</h1>
        <p class="text-xl text-gray-600">Welcome, Employee</p>
    </header>
    <main class="w-full bg-white shadow-2xl rounded-3xl p-8 max-w-4xl mx-auto">
        <h2 class="text-3xl font-bold text-center text-green-600 mb-6">Your Actions</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-green-50 p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow duration-300">
                <h3 class="text-xl font-bold text-green-700">Manage My Classes</h3>
                <p class="text-gray-600 mt-2">View your class schedule and assigned students.</p>
                <a href="View_Classes.html" class="text-green-500 hover:underline mt-4 inline-block font-semibold">View Classes &rarr;</a>
            </div>
            <div class="bg-green-50 p-6 rounded-xl shadow-md hover:shadow-lg transition-shadow duration-300">
                <h3 class="text-xl font-bold text-green-700">Enter Grades & Attendance</h3>
                <p class="text-gray-600 mt-2">Submit grades and mark student attendance for your classes.</p>
                <a href="Data.html" class="text-green-500 hover:underline mt-4 inline-block font-semibold">Enter Data &rarr;</a>
            </div>
        </div>
        <div class="mt-10 text-center">
            <a href="index.html" class="bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-lg hover:bg-green-700 transition-colors duration-300">Logout</a>
        </div>
    </main>
    <footer class="text-center p-4 mt-8 text-black text-sm font-bold w-full">
        <p>&copy; 2025 Dummy School. All Rights Reserved.</p>
    </footer>
</body>
</html>
